name: Diagnose MOD_PROJECT_TOKEN

# Manual-only diagnostic. Confirms whether the stored MOD_PROJECT_TOKEN can
# authenticate to GitHub and reach both org + user projects.
# Delete this workflow file after the token is confirmed working.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe token reach
        env:
          TOKEN: ${{ secrets.MOD_PROJECT_TOKEN }}
        run: |
          set -uo pipefail

          echo "--- Org project (gitpush-mod projects/3) ---"
          BODY='{"query":"{ organization(login: \"gitpush-mod\") { projectV2(number: 3) { id title } } }"}'
          curl -sS -o /tmp/gql1.json -w "HTTP %{http_code}\n" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -X POST -d "$BODY" \
            https://api.github.com/graphql
          cat /tmp/gql1.json; echo

          echo "--- User project (Godimas101 projects/2, Personal Projects) ---"
          BODY='{"query":"{ user(login: \"Godimas101\") { projectV2(number: 2) { id title } } }"}'
          curl -sS -o /tmp/gql2.json -w "HTTP %{http_code}\n" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -X POST -d "$BODY" \
            https://api.github.com/graphql
          cat /tmp/gql2.json; echo

          echo "--- Repo contents write test (dry) ---"
          # Just check that we can read a mod repo — write is implied if read of restricted metadata works
          curl -sS -o /tmp/rc.json -w "HTTP %{http_code}\n" \
            -H "Authorization: Bearer $TOKEN" \
            https://api.github.com/repos/gitpush-mod/se-infolcd-apex-update/contents/README.md
          head -c 200 /tmp/rc.json; echo
